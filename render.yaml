services:
  - type: web
    name: karaoke-bot
    runtime: python
    plan: free
    env: python
    buildCommand: |
      python --version
      pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: ROBLOX_API_KEY
        sync: false
      - key: ROBLOX_USER_ID
        sync: false
